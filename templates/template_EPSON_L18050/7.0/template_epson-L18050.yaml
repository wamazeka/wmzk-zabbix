    - uuid: 480a63a0b41441d880a57ff54c10c5f9
      name: First Printing Date
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.1248.1.2.2.27.1.1.13.1.1
      key: print.first.date
      delay: 1h
      history: 30d
      trends: '0'
      value_type: CHAR
      description: 'Date of first print job. Raw: 8-byte hex (year 2B, month 1B, day 1B)'
      tags:
      - tag: component
        value: counters
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'var b = value.trim().split('' '');

          var year  = (parseInt(b[0],16)<<8) | parseInt(b[1],16);

          var month = parseInt(b[2],16);

          var day   = parseInt(b[3],16);

          return year + ''-'' + (''0''+month).slice(-2) + ''-'' + (''0''+day).slice(-2);'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
