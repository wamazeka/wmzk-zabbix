zabbix_export:
  version: '7.4'
  template_groups:
  - uuid: 0c6c962430bb4fc8a69fea285f049068
    name: Templates/Printers
  templates:
  - uuid: b5dfb560f10b4ab0a9bbe723511bc2cd
    template: EPSON L18050 SNMPv3
    name: EPSON L18050 SNMPv3
    description: "Monitoring template for EPSON L18050 Series inkjet printer via SNMPv3.\n\nInk levels are read from Epson\
      \ private MIB 1.3.6.1.4.1.1248.1.8.2.14.7\nand reported individually per color (Black, Cyan, Magenta, Yellow,\nLight\
      \ Cyan, Light Magenta) on a 0-97 scale converted to percent.\n\nRequired macros:\n  {$SNMP_USER}      - SNMPv3 username\n\
      \  {$SNMP_AUTH_PASS} - authentication password (SHA)\n  {$SNMP_PRIV_PASS} - privacy password (AES)\n  {$SNMP_CONTEXT}\
      \   - SNMP context name (e.g. EPSONSN)\n  {$INK_LOW_WARN}   - ink low warning threshold %, default 20\n  {$INK_LOW_CRIT}\
      \   - ink critical threshold %, default 10\n\nTested on: EPSON L18050 Series, firmware TP31OA\nMIB vendor OID: 1.3.6.1.4.1.1248\
      \ (Seiko Epson Corporation)\n"
    groups:
    - name: Templates/Printers
    macros:
    - macro: '{$SNMP_USER}'
      value: zabbix
      description: SNMPv3 username
    - macro: '{$SNMP_AUTH_PASS}'
      value: ''
      type: SECRET_TEXT
      description: SNMPv3 authentication password (SHA)
    - macro: '{$SNMP_PRIV_PASS}'
      value: ''
      type: SECRET_TEXT
      description: SNMPv3 privacy password (AES)
    - macro: '{$SNMP_CONTEXT}'
      value: EPSONSN
      description: SNMPv3 context name (required for this printer)
    - macro: '{$INK_LOW_WARN}'
      value: '20'
      description: Ink level warning threshold (%)
    - macro: '{$INK_LOW_CRIT}'
      value: '10'
      description: Ink level critical threshold (%)
    - macro: '{$MAINT_LOW_WARN}'
      value: '20'
      description: Maintenance cartridge warning threshold (% remaining)
    - macro: '{$MAINT_LOW_CRIT}'
      value: '10'
      description: Maintenance cartridge critical threshold (% remaining)
    items:
    - uuid: 233f5c94c9094ff2b4134ff72c457641
      name: Printer Model Name
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.43.5.1.1.16.1
      key: printer.model
      delay: 1h
      history: 7d
      trends: '0'
      value_type: CHAR
      description: Printer model name (prtGeneralPrinterName, Printer MIB)
      tags:
      - tag: component
        value: system
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
    - uuid: a23f61dafccc4f97a26417cbc4d63baf
      name: Serial Number
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.1248.1.2.2.2.1.1.2.1.2
      key: printer.serial
      delay: 1h
      history: 30d
      trends: '0'
      value_type: CHAR
      description: Printer serial number (Epson private MIB)
      tags:
      - tag: component
        value: system
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
    - uuid: 643ebcb048094223aa61a3278956b2f4
      name: Firmware Version
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.1248.1.2.2.2.1.1.2.1.1
      key: printer.firmware
      delay: 1h
      history: 30d
      trends: '0'
      value_type: CHAR
      description: Main firmware version string (Epson private MIB)
      tags:
      - tag: component
        value: system
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      triggers:
      - uuid: 2b07d3b7dde64cdfbfa7b6f631e81cd7
        expression: change(/EPSON L18050 SNMPv3/printer.firmware)=1
        name: 'Firmware version changed (new: {ITEM.LASTVALUE})'
        priority: INFO
        description: Printer firmware has been updated. Verify the new version is expected.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: system
    - uuid: 0a47c45ee3ec473fa42921e4ad5f46cb
      name: System Uptime
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.3.0
      key: printer.uptime
      delay: 10m
      history: 30d
      trends: 90d
      units: uptime
      description: Time since the printer network interface last (re)started (sysUpTime)
      tags:
      - tag: component
        value: system
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '0.01'
      triggers:
      - uuid: 6caa5acc573c4483b783dea8a3c91deb
        expression: last(/EPSON L18050 SNMPv3/printer.uptime)<600
        name: Printer has been restarted (uptime < 10 min)
        priority: WARNING
        description: Printer uptime is less than 10 minutes — likely rebooted recently.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: availability
    - uuid: 5a723be3b93548858a8ac7e14b9d3839
      name: Printer Status
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.3.5.1.1.1
      key: printer.status
      delay: 1m
      history: 30d
      trends: 90d
      description: 'hrPrinterStatus (HOST-RESOURCES-MIB):

        1=other, 2=unknown, 3=idle, 4=printing, 5=warmup

        '
      valuemap:
        name: hrPrinterStatus
      tags:
      - tag: component
        value: status
      triggers:
      - uuid: cbdfea3955ec44f592e7ecbe97b31071
        expression: nodata(/EPSON L18050 SNMPv3/printer.status,10m)=1
        name: Printer is not responding via SNMP
        priority: AVERAGE
        description: No SNMP data received for 10 minutes. Printer may be offline or powered off.
        tags:
        - tag: scope
          value: availability
      - uuid: e5e71639e95d4b6d86012122118a7013
        expression: last(/EPSON L18050 SNMPv3/printer.status)=1 or last(/EPSON L18050 SNMPv3/printer.status)=2
        name: Printer status unknown
        priority: WARNING
        tags:
        - tag: scope
          value: availability
    - uuid: e8be538ebe664afa9169225e051d6754
      name: Printer Error State
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.3.5.1.2.1
      key: printer.error.state
      delay: 1m
      history: 30d
      trends: '0'
      value_type: CHAR
      description: 'hrPrinterDetectedErrorState bitmap decoded to human-readable string.

        Returns "OK" when no errors are present.

        '
      tags:
      - tag: component
        value: status
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'var bytes = value.trim().split('' '');

          var b = parseInt(bytes[0], 16);

          if (isNaN(b) || b === 0) return "OK";

          var errors = [];

          if (b & 0x80) errors.push("Low Paper");

          if (b & 0x40) errors.push("No Paper");

          if (b & 0x20) errors.push("Low Ink");

          if (b & 0x10) errors.push("No Ink");

          if (b & 0x08) errors.push("Door Open");

          if (b & 0x04) errors.push("Paper Jam");

          if (b & 0x02) errors.push("Offline");

          if (b & 0x01) errors.push("Service Required");

          return errors.join(", ");

          '
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      triggers:
      - uuid: 2e155dce540f41ec88699fe685b30fdb
        expression: last(/EPSON L18050 SNMPv3/printer.error.state)<>"OK"
        name: 'Printer error: {ITEM.LASTVALUE}'
        priority: HIGH
        description: Printer reported one or more errors via hrPrinterDetectedErrorState.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: availability
    - uuid: c9c97172f34d450c8cd0496d35cf4547
