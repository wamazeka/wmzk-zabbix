    - uuid: 2565604185d546eb9ab8cbae89ae50be
      name: Network Interface MAC Address
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.2.2.1.6.1
      key: net.if.mac
      delay: 1h
      history: 30d
      trends: '0'
      value_type: CHAR
      description: MAC address of the network interface (ifPhysAddress, IF-MIB)
      tags:
      - tag: component
        value: network
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'return value.trim().split(" ").map(function(b){return b}).join(":");

          '
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      triggers:
      - uuid: e7af19f42be34c02a99fc166a8ac67f1
        expression: change(/EPSON L18050 SNMPv3/net.if.mac)=1
        name: 'MAC address changed (new: {ITEM.LASTVALUE})'
        priority: HIGH
        description: Network interface MAC address has changed unexpectedly.
        manual_close: 'YES'
        tags:
