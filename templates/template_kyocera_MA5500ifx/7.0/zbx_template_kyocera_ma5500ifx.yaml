        value: paper
      triggers:
      - uuid: 9853a25301e14a7a86ccce1c7477b22d
        expression: last(/Kyocera ECOSYS MA5500ifx SNMPv3/paper.cassette1.pct)<={$PAPER_LOW_WARN}
        name: 'Cassette 1: paper low ({ITEM.LASTVALUE})'
        priority: WARNING
        tags:
        - tag: scope
          value: capacity
      - uuid: 558ec9c134374296b535081a11978068
        expression: last(/Kyocera ECOSYS MA5500ifx SNMPv3/paper.cassette1.pct)=0
        name: 'Cassette 1: paper empty'
        priority: AVERAGE
        tags:
        - tag: scope
          value: capacity
      master_item:
        key: paper.cassette1.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'var v = parseInt(value);

          if (isNaN(v) || v <= 0) return 0;

          return Math.round(v / 500 * 100);'
    - uuid: edf4a9302b7442c284ae0c85afbf1eb4
      name: 'Paper: MP Tray Status'
      type: DEPENDENT
      key: paper.mptray.status
      delay: '0'
      history: 30d
      trends: '0'
      description: MP Tray paper presence status. MP Tray cannot measure sheet count — only detects paper present or absent.
      tags:
      - tag: component
        value: paper
      master_item:
        key: paper.mptray.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'var v = parseInt(value);

